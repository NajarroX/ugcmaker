<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAJARRO STUDIO | CANVA MAKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800&family=Space+Grotesk:wght@300;400;600;700&family=Syncopate:wght@400;700&family=Orbitron:wght@400;500;800&family=Montserrat:ital,wght@0,300;0,600;0,800;1,400&family=Pacifico&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,500;1,600&family=Rajdhani:wght@300;500;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            /* NIGHTMODE: fondo más claro (se aclaró un 10% aproximadamente) */
            background: #181b22;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, system-ui, -apple-system, sans-serif;
            font-weight: 400;
            color: #eceef2;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.2s ease, color 0.2s ease;
        }

        /* DAYMODE overwrites (se aplica dinámicamente via JS, pero mantenemos clases base) */
        body.daymode {
            background: #eef2f8;
            color: #1e1f2c;
        }

        /* HEADER NEUMORFISMO NIGHTMODE + DAYMODE VARIANT */
        header {
            height: 85px;
            background: #1f232c; /* nightmode default */
            box-shadow: 8px 8px 16px #0e1016, -8px -8px 16px #30363f;
            border-radius: 0 0 28px 28px;
            margin: 0 16px 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
            backdrop-filter: blur(2px);
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        body.daymode header {
            background: #ffffff;
            box-shadow: 8px 8px 16px #cbd5e1, -8px -8px 16px #ffffff;
        }

        .brand {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: 2px;
            color: #eef2ff;
            font-size: 18px;
            background: transparent;
            padding: 8px 0px;
            border-radius: 0;
            box-shadow: none;
            transition: 0.2s;
        }

        body.daymode .brand {
            color: #1e293b;
        }

        /* Estructura principal */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            gap: 16px;
            padding: 16px 20px 20px 20px;
        }

        /* SIDEBARS neumórficos nightmode + daymode variants */
        .sidebar {
            width: 300px;
            background: #1f232c;
            border-radius: 32px;
            box-shadow: 12px 12px 24px #101217, -12px -12px 24px #2e3440;
            padding: 24px 20px;
            overflow-y: auto;
            transition: all 0.2s;
            backdrop-filter: blur(2px);
            position: relative;
        }

        body.daymode .sidebar {
            background: #f8fafc;
            box-shadow: 12px 12px 24px #d1d9e6, -12px -12px 24px #ffffff;
        }

        .sidebar::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: #2a2e36;
            border-radius: 10px;
        }
        body.daymode .sidebar::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #5a5f6e;
            border-radius: 10px;
        }
        body.daymode .sidebar::-webkit-scrollbar-thumb {
            background: #94a3b8;
        }

        /* Viewport: zona central neumórfica */
        .viewport {
            flex: 1;
            background: #15181f;
            border-radius: 48px;
            box-shadow: inset 6px 6px 12px #0a0c10, inset -6px -6px 12px #262a34, 12px 12px 28px #0a0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        body.daymode .viewport {
            background: #f1f5f9;
            box-shadow: inset 6px 6px 12px #d9e0e8, inset -6px -6px 12px #ffffff, 12px 12px 28px #cbd5e1;
        }

        #canvas-wrapper {
            box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.6), -8px -8px 16px rgba(255, 255, 255, 0.05);
            background: #ffffff;
            border-radius: 12px;
            transform-origin: center;
            transition: transform 0.2s ease-out;
        }

        /* Títulos */
        .section-title {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #a9aec7;
            margin: 28px 0 14px 0;
            border-left: 3px solid #5f7f9e;
            padding-left: 12px;
        }

        body.daymode .section-title {
            color: #475569;
            border-left-color: #64748b;
        }

        /* Botones neumórficos nightmode + daymode */
        .btn-action {
            width: 100%;
            padding: 12px 10px;
            background: #1f232c;
            border: none;
            color: #eef2fc;
            border-radius: 60px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            transition: 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 6px 6px 12px #0e1016, -6px -6px 12px #30363f;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        body.daymode .btn-action {
            background: #ffffff;
            color: #1e293b;
            box-shadow: 6px 6px 12px #cbd5e1, -6px -6px 12px #ffffff;
        }

        .btn-action:active {
            transform: scale(0.97);
            box-shadow: inset 4px 4px 8px #0c0d11, inset -4px -4px 8px #282b34;
        }

        body.daymode .btn-action:active {
            box-shadow: inset 4px 4px 8px #cbd5e1, inset -4px -4px 8px #ffffff;
        }

        .btn-action:hover {
            background: #2e3540;
            color: #ffffff;
            box-shadow: 5px 5px 12px #0c0d11, -5px -5px 12px #383e4b;
        }

        body.daymode .btn-action:hover {
            background: #f1f5f9;
            color: #0f172a;
            box-shadow: 5px 5px 12px #cbd5e1, -5px -5px 12px #ffffff;
        }

        .btn-primary {
            background: #2c2f3a;
            color: #f0f3ff;
            box-shadow: 6px 6px 12px #0b0c0f, -6px -6px 12px #3a3e4b;
        }

        body.daymode .btn-primary {
            background: #e2e8f0;
            color: #0f172a;
            box-shadow: 6px 6px 12px #cbd5e1, -6px -6px 12px #ffffff;
        }

        .btn-primary:active {
            background: #3a3f4d;
            box-shadow: inset 4px 4px 10px #101116, inset -4px -4px 10px #404554;
        }

        body.daymode .btn-primary:active {
            background: #cbd5e1;
            box-shadow: inset 4px 4px 10px #b9c2ce, inset -4px -4px 10px #ffffff;
        }

        /* Botones de exportación más grandes */
        .btn-export {
            width: auto;
            padding: 14px 32px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 140px;
        }
        
        .btn-export-png {
            background: #2c2f3a;
            color: #f0f3ff;
            box-shadow: 6px 6px 12px #0b0c0f, -6px -6px 12px #3a3e4b;
        }
        body.daymode .btn-export-png {
            background: #e2e8f0;
            color: #0f172a;
        }
        .btn-export-png:hover {
            background: #3a3f4d;
            transform: translateY(-1px);
        }
        body.daymode .btn-export-png:hover {
            background: #cbd5e1;
        }
        .btn-export-pdf {
            background: #3a3f4d;
            color: #ffffff;
            box-shadow: 6px 6px 12px #0b0c0f, -6px -6px 12px #3a3e4b;
        }
        body.daymode .btn-export-pdf {
            background: #cbd5e1;
            color: #0f172a;
        }
        .btn-export-pdf:hover {
            background: #4a4f5e;
            transform: translateY(-1px);
        }
        body.daymode .btn-export-pdf:hover {
            background: #94a3b8;
            color: #fff;
        }

        .history-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .align-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }
        .btn-small {
            padding: 9px 0;
            font-size: 10px;
            font-weight: 600;
            box-shadow: 4px 4px 8px #0c0d11, -4px -4px 8px #282b34;
        }
        body.daymode .btn-small {
            box-shadow: 4px 4px 8px #cbd5e1, -4px -4px 8px #ffffff;
        }

        /* Selects e inputs nightmode + daymode */
        select, input[type="number"] {
            width: 100%;
            background: #1f232c;
            border: none;
            color: #eff3ff;
            padding: 12px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 14px;
            font-family: 'Inter', monospace;
            box-shadow: inset 3px 3px 6px #0e1016, inset -3px -3px 6px #30363f;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        
        body.daymode select, body.daymode input[type="number"] {
            background: #ffffff;
            color: #1e293b;
            box-shadow: inset 3px 3px 6px #cbd5e1, inset -3px -3px 6px #ffffff;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23a9aec7%22%3E%3Cpath%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        body.daymode select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23475569%22%3E%3Cpath%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E");
        }

        /* Capas neumórficas */
        .layer-item {
            background: #1f232c;
            padding: 12px 14px;
            border-radius: 28px;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 5px 5px 12px #0e1016, -5px -5px 12px #30363f;
            transition: 0.15s;
            color: #dddfe8;
        }
        body.daymode .layer-item {
            background: #ffffff;
            box-shadow: 5px 5px 12px #cbd5e1, -5px -5px 12px #ffffff;
            color: #1e293b;
        }
        .layer-item.active {
            background: #2d3340;
            box-shadow: inset 3px 3px 6px #0e1016, inset -3px -3px 6px #404654;
            border: 0.5px solid rgba(255,255,255,0.08);
            color: #ffffff;
            font-weight: 700;
        }
        body.daymode .layer-item.active {
            background: #e2e8f0;
            box-shadow: inset 3px 3px 6px #cbd5e1, inset -3px -3px 6px #ffffff;
            color: #0f172a;
        }
        .layer-item button {
            background: none;
            border: none;
            color: #b9c0d4;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            border-radius: 30px;
            padding: 4px 8px;
            transition: all 0.1s;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        body.daymode .layer-item button {
            color: #475569;
        }
        .layer-item button:hover {
            background: #2f3540;
            box-shadow: inset 1px 1px 3px #101216;
            color: #fff;
        }
        body.daymode .layer-item button:hover {
            background: #cbd5e1;
            color: #0f172a;
        }

        .layer-buttons {
            display: flex;
            gap: 8px;
        }
        .layer-buttons button {
            background: none;
            border: none;
            color: #b9c0d4;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            border-radius: 30px;
            padding: 4px 8px;
            transition: all 0.1s;
        }
        .layer-buttons button:hover {
            background: #2f3540;
            box-shadow: inset 1px 1px 3px #101216;
            color: #fff;
        }
        body.daymode .layer-buttons button:hover {
            background: #cbd5e1;
            color: #000;
        }

        .export-buttons {
            display: flex;
            gap: 16px;
        }

        /* Contenedor de zoom unificado */
        .zoom-container {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f232c;
            padding: 10px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 6px 6px 14px #0e1016, -6px -6px 14px #30363f;
            backdrop-filter: blur(4px);
            z-index: 50;
        }
        body.daymode .zoom-container {
            background: #ffffff;
            box-shadow: 6px 6px 14px #cbd5e1, -6px -6px 14px #ffffff;
        }
        .zoom-container span {
            font-size: 12px;
            font-weight: 600;
            color: #d6def5;
            letter-spacing: 0.5px;
            white-space: nowrap;
            min-width: 65px;
        }
        body.daymode .zoom-container span {
            color: #1e293b;
        }

        input[type="range"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 100%;
            background: #1f232c;
            border-radius: 20px;
            height: 6px;
            box-shadow: inset 2px 2px 5px #0e1016, inset -2px -2px 5px #30363f;
        }
        body.daymode input[type="range"] {
            background: #ffffff;
            box-shadow: inset 2px 2px 5px #cbd5e1, inset -2px -2px 5px #ffffff;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #9aa9c9;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            cursor: pointer;
            border: none;
        }
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: #9aa9c9;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        .zoom-container input[type="range"] {
            width: 150px;
            margin: 0;
        }

        input[type="color"] {
            width: 100%;
            height: 52px;
            background: #1f232c;
            border: none;
            border-radius: 50px;
            padding: 6px;
            cursor: pointer;
            box-shadow: inset 3px 3px 8px #0e1016, inset -3px -3px 8px #30363f;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        body.daymode input[type="color"] {
            background: #ffffff;
            box-shadow: inset 3px 3px 8px #cbd5e1, inset -3px -3px 8px #ffffff;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 40px;
        }

        label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #a3abca;
            margin-bottom: 6px;
            display: block;
        }
        body.daymode label {
            color: #475569;
        }

        input[type="file"] {
            display: none;
        }

        .sidebar.right .section-title:first-of-type {
            margin-top: 0;
        }
        button {
            font-family: inherit;
        }

        /* TOGGLE MODE BUTTON */
        .mode-toggle-btn {
            background: #2c2f3a;
            box-shadow: 6px 6px 12px #0b0c0f, -6px -6px 12px #3a3e4b;
            padding: 10px 20px;
            min-width: auto;
            margin-left: auto;
            margin-right: 20px;
        }
        body.daymode .mode-toggle-btn {
            background: #e2e8f0;
            color: #0f172a;
            box-shadow: 6px 6px 12px #cbd5e1, -6px -6px 12px #ffffff;
        }

        /* responsive */
        .mobile-toggles { display: none; }
        .close-sidebar-btn { display: none; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 800; backdrop-filter: blur(3px); }

        @media (max-width: 900px) {
            header { flex-direction: column; height: auto; padding: 16px; border-radius: 0 0 24px 24px; text-align: center; gap: 16px; }
            .export-buttons { width: 100%; justify-content: space-between; }
            .mode-toggle-btn { margin-left: auto; margin-right: 0; width: auto; }
            .btn-export { padding: 12px; font-size: 11px; flex: 1; min-width: auto; }
            .main-container { padding: 10px; flex-direction: column; }
            .viewport { border-radius: 24px; padding-bottom: 90px; } 
            .sidebar { position: fixed; top: 0; height: 100vh; z-index: 1000; border-radius: 0; width: 85%; max-width: 320px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: none; padding-top: 60px; }
            .sidebar:not(.right) { left: 0; transform: translateX(-105%); box-shadow: 15px 0 30px rgba(0,0,0,0.8); }
            .sidebar.right { right: 0; transform: translateX(105%); box-shadow: -15px 0 30px rgba(0,0,0,0.8); }
            .sidebar.active { transform: translateX(0) !important; }
            .mobile-toggles { display: flex; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); gap: 16px; z-index: 500; }
            .mobile-toggles button { margin-bottom: 0; padding: 16px 10px; font-size: 12px; font-weight: 700; }
            .close-sidebar-btn { display: block; position: absolute; top: 16px; right: 20px; background: #252a33; border: none; color: #eef2fc; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: inset 2px 2px 4px #0c0d11, inset -2px -2px 4px #282b34; }
            body.daymode .close-sidebar-btn { background: #e2e8f0; color: #1e293b; box-shadow: inset 2px 2px 4px #cbd5e1, inset -2px -2px 4px #ffffff; }
            .overlay.active { display: block; }
            .zoom-container { bottom: 90px; padding: 8px 16px; gap: 10px; }
            .zoom-container input[type="range"] { width: 100px; }
        }
    </style>
</head>
<body>

<div class="overlay" onclick="closeSidebars()"></div>

<header>
    <div class="brand">NAJARRO X STUDIO · CANVA MAKER</div>
    <div style="display: flex; gap: 12px; align-items: center;">
        <button class="btn-action mode-toggle-btn" onclick="toggleDayNightMode()">🌓 MODO DAY/NIGHT</button>
        <div class="export-buttons">
            <button class="btn-action btn-export btn-export-png" onclick="exportPNG()">📸 EXPORTAR PNG</button>
            <button class="btn-action btn-export btn-export-pdf" onclick="exportPDF()">📄 EXPORTAR PDF</button>
        </div>
    </div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <button class="close-sidebar-btn" onclick="closeSidebars()">✕</button>

        <div class="history-controls">
            <button class="btn-action" onclick="undo()">⟲ DESHACER</button>
            <button class="btn-action" onclick="redo()">⟳ REHACER</button>
        </div>

        <div class="section-title">CREAR ELEMENTOS</div>
        <button class="btn-action" onclick="addText()">+ AGREGAR TEXTO</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-action" onclick="addShape('rect')">CUADRADO</button>
            <button class="btn-action" onclick="addShape('circle')">CÍRCULO</button>
        </div>
        <label class="btn-action" style="cursor: pointer;">
            + SUBIR IMAGEN
            <input type="file" style="display:none;" onchange="uploadImage(event)">
        </label>

        <div class="section-title">DIMENSIONES DEL LIENZO</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
                <label>ANCHO</label>
                <input type="number" id="wInput" value="1080">
            </div>
            <div>
                <label>ALTO</label>
                <input type="number" id="hInput" value="1350">
            </div>
        </div>
        <button class="btn-action" onclick="resizeCanvas()">AJUSTAR LIENZO</button>
    </aside>

    <div class="viewport">
        <div id="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>
        
        <div class="zoom-container">
            <span id="zoomVal">Vista: 50%</span>
            <input type="range" min="0.1" max="1.5" step="0.01" value="0.5" oninput="changeZoom(this.value)">
        </div>

        <div class="mobile-toggles">
            <button class="btn-action" onclick="toggleSidebar('left')">🛠️ HERRAMIENTAS</button>
            <button class="btn-action" onclick="toggleSidebar('right')">⚙️ CAPAS Y ESTILO</button>
        </div>
    </div>

    <aside class="sidebar right">
        <button class="close-sidebar-btn" onclick="closeSidebars()">✕</button>

        <div id="textControls" style="display:none;">
            <div class="section-title">TEXTO PRO · FUENTES</div>
            <label>SELECCIONAR TIPOGRAFÍA</label>
            <select id="fontFamily" onchange="changeFont(this.value)">
                <option value="Space Grotesk">⚡ Space Grotesk (Futurista)</option>
                <option value="Orbitron">🛸 Orbitron (Tech)</option>
                <option value="Syncopate">◢ Syncopate (Wide)</option>
                <option value="Rajdhani">🔲 Rajdhani (Moderna)</option>
                <option value="Montserrat">📐 Montserrat (Geométrica)</option>
                <option value="Quicksand">✨ Quicksand (Suave)</option>
                <option value="Pacifico">✒️ Pacifico (Script Cursiva)</option>
                <option value="Dancing Script">💃 Dancing Script (Elegante Script)</option>
                <option value="Playfair Display">📖 Playfair Display (Editorial)</option>
                <option value="Inter">📝 Inter (Neo-grotesk)</option>
                <option value="Helvetica Neue">🅷 Helvetica Neue (Clásica)</option>
            </select>

            <label>ALINEACIÓN</label>
            <div class="align-grid">
                <button class="btn-action btn-small" onclick="updateProp('textAlign', 'left')">IZQ</button>
                <button class="btn-action btn-small" onclick="updateProp('textAlign', 'center')">CENT</button>
                <button class="btn-action btn-small" onclick="updateProp('textAlign', 'right')">DER</button>
                <button class="btn-action btn-small" onclick="updateProp('textAlign', 'justify')">JUST</button>
            </div>
        </div>

        <div class="section-title">ESTILO GLOBAL</div>
        <label>COLOR</label>
        <input type="color" id="colorPicker" onchange="applyGlobalColor(this.value)" style="height:52px; cursor:pointer; margin-bottom:18px; width:100%;">
        
        <label>OPACIDAD</label>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="updateProp('opacity', parseFloat(this.value))">

        <div class="section-title">CAPAS</div>
        <div id="layerPanel"></div>
    </aside>
</div>

<script>
    let canvas;
    let history = [];
    let redoStack = [];
    let isModifying = false;

    window.onload = () => {
        canvas = new fabric.Canvas('mainCanvas', {
            width: 1080,
            height: 1350,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        canvas.on({
            'object:modified': saveState,
            'object:added': saveState,
            'object:removed': saveState,
            'selection:created': updateUI,
            'selection:updated': updateUI,
            'selection:cleared': updateUI,
            'text:changed': (e) => {
                if(e.target) {
                    e.target.initDimensions();
                    canvas.requestRenderAll();
                }
            }
        });

        saveState();
        changeZoom(0.5);
        updateLayerPanel();
    };

    /* TOGGLE DAY/NIGHT MODE */
    function toggleDayNightMode() {
        document.body.classList.toggle('daymode');
    }

    /* =========================================
       FUNCIONES RESPONSIVE (sin cambios)
       ========================================= */
    function toggleSidebar(side) {
        const leftSidebar = document.querySelector('.sidebar:not(.right)');
        const rightSidebar = document.querySelector('.sidebar.right');
        const overlay = document.querySelector('.overlay');
        if (side === 'left') {
            leftSidebar.classList.toggle('active');
            rightSidebar.classList.remove('active');
            overlay.classList.add('active');
        } else {
            rightSidebar.classList.toggle('active');
            leftSidebar.classList.remove('active');
            overlay.classList.add('active');
        }
    }

    function closeSidebars() {
        document.querySelector('.sidebar:not(.right)').classList.remove('active');
        document.querySelector('.sidebar.right').classList.remove('active');
        document.querySelector('.overlay').classList.remove('active');
    }

    /* ========== FUNCIONES EXISTENTES (sin modificar lógica) ========= */
    function saveState() {
        if (isModifying) return;
        const state = JSON.stringify(canvas);
        if (history.length > 0 && history[history.length - 1] === state) return;
        history.push(state);
        if (history.length > 20) history.shift();
        redoStack = [];
        updateLayerPanel();
    }

    function undo() {
        if (history.length <= 1) return;
        isModifying = true;
        redoStack.push(history.pop());
        canvas.loadFromJSON(history[history.length - 1], () => {
            canvas.requestRenderAll();
            isModifying = false;
            updateUI();
        });
    }

    function redo() {
        if (redoStack.length === 0) return;
        isModifying = true;
        const state = redoStack.pop();
        history.push(state);
        canvas.loadFromJSON(state, () => {
            canvas.requestRenderAll();
            isModifying = false;
            updateUI();
        });
    }

    function addText() {
        const text = new fabric.IText('N/X ENGINE\nNIGHTMODE', {
            left: 120, top: 120,
            fontFamily: 'Space Grotesk',
            fontSize: 84,
            fill: '#111111',
            textAlign: 'left',
            fontWeight: '700'
        });
        canvas.add(text).setActiveObject(text);
        text.initDimensions();
        canvas.renderAll();
        saveState();
        closeSidebars();
    }

    function changeFont(fontName) {
        const active = canvas.getActiveObject();
        if (active && active.type === 'i-text') {
            active.set('fontFamily', fontName);
            setTimeout(() => {
                active.initDimensions();
                active.setCoords();
                canvas.requestRenderAll();
                saveState();
            }, 10);
        }
    }

    function applyGlobalColor(color) {
        const active = canvas.getActiveObject();
        if (active) {
            if (active.type === 'i-text') active.setSelectionStyles(null);
            active.set('fill', color);
            canvas.requestRenderAll();
            saveState();
        }
    }

    function addShape(type) {
        const isDarkTheme = Math.random() > 0.5 ? '#3a4052' : '#585e72';
        const config = { left: 200, top: 200, fill: isDarkTheme, opacity: 0.9, stroke: '#20232c', strokeWidth: 2 };
        const shape = type === 'rect' ? 
            new fabric.Rect({ ...config, width: 280, height: 280 }) : 
            new fabric.Circle({ ...config, radius: 140 });
        canvas.add(shape).setActiveObject(shape);
        canvas.renderAll();
        saveState();
        closeSidebars();
    }

    function uploadImage(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToWidth(550);
                img.set('shadow', null);
                canvas.add(img).setActiveObject(img);
                canvas.renderAll();
                saveState();
                closeSidebars();
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function updateUI() {
        const active = canvas.getActiveObject();
        const textPanel = document.getElementById('textControls');
        if(active && active.type === 'i-text') {
            textPanel.style.display = 'block';
            const fontSelect = document.getElementById('fontFamily');
            if(fontSelect && active.fontFamily) fontSelect.value = active.fontFamily;
        } else {
            textPanel.style.display = 'none';
        }
        if (active) {
            const colorPicker = document.getElementById('colorPicker');
            if(active.fill && typeof active.fill === 'string') colorPicker.value = active.fill;
            if(active.opacity !== undefined) {
                const rangeOp = document.querySelector('input[oninput*="opacity"]');
                if(rangeOp) rangeOp.value = active.opacity;
            }
        }
        updateLayerPanel();
    }

    function updateProp(prop, val) {
        const active = canvas.getActiveObject();
        if (active) {
            active.set(prop, val);
            if(prop === 'textAlign') active.initDimensions();
            if(prop === 'opacity') active.set('opacity', parseFloat(val));
            active.setCoords();
            canvas.requestRenderAll();
            saveState();
        }
    }

    function bringLayerUp(idx) {
        const objects = canvas.getObjects();
        if(idx < 0 || idx >= objects.length) return;
        const obj = objects[idx];
        obj.bringForward();
        canvas.requestRenderAll();
        saveState();
        updateLayerPanel();
    }

    function sendLayerDown(idx) {
        const objects = canvas.getObjects();
        if(idx < 0 || idx >= objects.length) return;
        const obj = objects[idx];
        obj.sendBackwards();
        canvas.requestRenderAll();
        saveState();
        updateLayerPanel();
    }

    function deleteObj(idx) {
        const objects = canvas.getObjects();
        if(idx >= 0 && idx < objects.length){
            canvas.remove(objects[idx]);
            canvas.requestRenderAll();
            saveState();
            updateUI();
        }
    }

    function updateLayerPanel() {
        const panel = document.getElementById('layerPanel');
        if(!panel) return;
        panel.innerHTML = '';
        const objects = canvas.getObjects();
        [...objects].reverse().forEach((obj) => {
            const realIdx = objects.indexOf(obj);
            const div = document.createElement('div');
            div.className = `layer-item ${canvas.getActiveObject() === obj ? 'active' : ''}`;
            let typeName = obj.type.toUpperCase();
            if(obj.type === 'i-text') typeName = 'TEXTO';
            if(obj.type === 'image') typeName = 'IMAGEN';
            if(obj.type === 'rect') typeName = 'RECTÁNGULO';
            if(obj.type === 'circle') typeName = 'CÍRCULO';
            div.innerHTML = `
                <span style="font-weight: 600;">${typeName}</span>
                <div class="layer-buttons">
                    <button onclick="bringLayerUp(${realIdx})" title="Traer al frente">↑</button>
                    <button onclick="sendLayerDown(${realIdx})" title="Enviar atrás">↓</button>
                    <button onclick="deleteObj(${realIdx})" title="Eliminar">✕</button>
                </div>
            `;
            div.onclick = (e) => { 
                if(e.target.tagName !== 'BUTTON') { 
                    canvas.setActiveObject(obj); 
                    canvas.renderAll(); 
                    updateUI();
                } 
            };
            panel.appendChild(div);
        });
    }

    function resizeCanvas() {
        const w = parseInt(document.getElementById('wInput').value) || 1080;
        const h = parseInt(document.getElementById('hInput').value) || 1080;
        canvas.setDimensions({ width: w, height: h });
        canvas.backgroundColor = '#ffffff';
        canvas.renderAll();
        saveState();
    }

    function changeZoom(val) {
        const scaleVal = parseFloat(val);
        document.getElementById('canvas-wrapper').style.transform = `scale(${scaleVal})`;
        document.getElementById('zoomVal').innerText = `Vista: ${Math.round(scaleVal * 100)}%`;
    }

    function exportPNG() {
        canvas.discardActiveObject().renderAll();
        const dataURL = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 1 });
        const link = document.createElement('a');
        link.download = `najarro_nightmode_${Date.now()}.png`;
        link.href = dataURL;
        link.click();
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const w = canvas.width;
        const h = canvas.height;
        const orientation = w > h ? 'l' : 'p';
        const pdf = new jsPDF(orientation, 'px', [w, h]);
        canvas.discardActiveObject().renderAll();
        const imgData = canvas.toDataURL({ format: 'png', quality: 1 });
        pdf.addImage(imgData, 'PNG', 0, 0, w, h);
        pdf.save("najarro_studio_nightmode.pdf");
    }
</script>
</body>
</html>
