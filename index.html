<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text FX · Imágenes PNG + SVG</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1a1a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .app-container {
            width: 100%;
            max-width: 1600px;
            background: #16213e;
            border-radius: 36px;
            padding: 20px;
            box-shadow: 0 25px 50px -8px #00000080;
            position: relative;
        }
        
        /* Canvas area */
        .canvas-area {
            display: flex;
            justify-content: center;
            background: #0f0f1f;
            border-radius: 32px;
            padding: 20px;
            border: 2px solid #2a3a5e;
        }
        canvas {
            display: block;
            border-radius: 24px;
            box-shadow: 0 18px 30px #00000080;
            background: #1e2a3a;
            width: 100%;
            height: auto;
            cursor: grab;
            border: 3px solid #3f4e77;
            max-width: 100%;
        }
        canvas:active {
            cursor: grabbing;
        }

        /* ===== BOTONES FLOTANTES GLOBALES ===== */
        .floating-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }
        .floating-container > * {
            pointer-events: auto;
        }

        .floating-menu-btn {
            width: 60px;
            height: 60px;
            border-radius: 60px;
            background: #2a3f6e;
            border: 2px solid #8a7adf;
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1a30, 0 10px 20px #00000060;
            transition: all 0.1s ease;
            margin-bottom: 5px;
        }
        .floating-menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1a30, 0 10px 20px #00000060;
        }
        .floating-menu-btn.active {
            background: #5a3f9c;
            border-color: #b79aff;
        }

        .floating-action-btn {
            width: 60px;
            height: 60px;
            border-radius: 60px;
            background: #4a3a8c;
            border: 2px solid #8a7adf;
            color: white;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #1f1745, 0 10px 20px #00000060;
            transition: all 0.1s ease;
            font-weight: bold;
        }
        .floating-action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1f1745, 0 10px 20px #00000060;
        }
        .floating-action-btn:hover {
            background: #5f4bb0;
            transform: scale(1.05);
        }
        .floating-action-btn.delete-btn {
            background: #8a3a5c;
            border-color: #df8aad;
        }
        .floating-action-btn.delete-btn:hover {
            background: #a84a74;
        }
        .floating-action-btn.image-btn {
            background: #3a6e8a;
            border-color: #8adfdf;
        }

        .floating-menu-btn::after, .floating-action-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 70px;
            background: #1e2a47;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            white-space: nowrap;
            border: 1px solid #8a7adf;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            font-weight: normal;
        }
        .floating-menu-btn:hover::after, .floating-action-btn:hover::after {
            opacity: 1;
        }

        /* ===== CONTROLES DE ESCALA/ROTACIÓN FLOTANTES ===== */
        .transform-controls {
            position: fixed;
            left: 30px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }
        .transform-group {
            background: #1f2b42;
            border: 2px solid #5f7dbf;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 20px #00000080;
            pointer-events: auto;
            min-width: 200px;
        }
        .transform-group label {
            color: #b0c2f0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .transform-group input[type=range] {
            width: 100%;
            accent-color: #8a6eff;
            background: #0e1a2b;
            height: 8px;
            border-radius: 10px;
        }
        .transform-group .value-display {
            color: white;
            font-size: 0.9rem;
            text-align: right;
            margin-top: -5px;
        }
        .transform-group .hint {
            color: #a5b9ff;
            font-size: 0.7rem;
            text-align: center;
        }

        @media (max-width: 700px) {
            .floating-container {
                bottom: 20px;
                right: 20px;
            }
            .transform-controls {
                left: 20px;
                bottom: 20px;
            }
            .floating-menu-btn, .floating-action-btn {
                width: 55px;
                height: 55px;
                font-size: 1.6rem;
            }
            .transform-group {
                min-width: 160px;
                padding: 10px 15px;
            }
        }

        /* Panel de edición */
        .edit-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 90%;
            max-width: 1300px;
            max-height: 85vh;
            background: #1f2b42;
            backdrop-filter: blur(10px);
            border: 2px solid #5f7dbf;
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 30px 60px #000000d0, 0 0 0 4px #2a3f6e inset;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            overflow-y: auto;
            color: #f0f0ff;
        }
        .edit-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #00000080;
            backdrop-filter: blur(3px);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .panel-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3f5a9c;
        }
        .panel-header h2 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffb8b8, #a8d8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: #3f2e6e;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #9f8adf;
        }

        .controls-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .control-section {
            background: #1a253b;
            border-radius: 40px;
            padding: 24px 20px;
            border: 1px solid #4f6b9e;
        }
        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #b0c6ff;
            font-weight: 500;
        }
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 30px;
            justify-content: flex-start;
            align-items: flex-end;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 150px;
            flex: 1 0 140px;
        }
        .control-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #b0c2f0;
            letter-spacing: 0.5px;
        }
        .control-group input, .control-group select, .control-group textarea {
            background: #0e1a2b;
            border: 2px solid #3f5680;
            color: white;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: 500;
            outline: none;
            transition: 0.15s;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .control-group textarea {
            resize: vertical;
            min-height: 80px;
            width: 100%;
        }
        .control-group input[type="color"] {
            height: 52px;
            padding: 6px;
            cursor: pointer;
        }
        .control-group input[type="range"] {
            padding: 0;
            accent-color: #8a6eff;
        }
        
        .custom-font-upload, .custom-image-upload {
            background: #2a3a6e;
            border-radius: 40px;
            padding: 12px 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #5f7dbf;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .custom-font-upload input, .custom-image-upload input {
            display: none;
        }

        .action-buttons-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }
        .primary-btn, .secondary-btn {
            background: #4a3a8c;
            border: none;
            color: white;
            font-weight: 700;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            border-bottom: 4px solid #1f1745;
            transition: 0.1s ease;
            flex: 1 0 auto;
            min-width: 160px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .primary-btn:active, .secondary-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }
        .secondary-btn {
            background: #3f5270;
            border-bottom-color: #1d2a40;
        }
        .export-options {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .transparent-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1b2640;
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid #6d85c0;
        }
        .active-text-indicator {
            background: #2f3d66;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #a7b9ff;
        }
        .alignment-buttons {
            display: flex;
            gap: 8px;
            background: #1b2740;
            padding: 6px;
            border-radius: 60px;
            border: 1px solid #5f7dbf;
        }
        .align-btn {
            background: transparent;
            border: none;
            color: #b9c7ff;
            font-size: 1.3rem;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .align-btn.active {
            background: #4e3f9e;
            color: white;
        }
        .line-height-control {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .image-fit-info, .stroke-info, .font-info, .image-info {
            font-size: 0.75rem;
            color: #a5b9ff;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Canvas principal -->
    <div class="canvas-area">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Botones flotantes derecha -->
    <div class="floating-container">
        <button class="floating-menu-btn" id="floatingMenuBtn" data-tooltip="Abrir panel de edición">☰</button>
        <button class="floating-action-btn" id="floatingAddTextBtn" data-tooltip="Añadir párrafo">📝</button>
        <button class="floating-action-btn image-btn" id="floatingAddImageBtn" data-tooltip="Añadir imagen PNG/SVG">🖼️</button>
        <button class="floating-action-btn delete-btn" id="floatingDeleteBtn" data-tooltip="Borrar seleccionado">🗑️</button>
    </div>

    <!-- Controles de escala/rotación izquierda -->
    <div class="transform-controls">
        <div class="transform-group">
            <label>🔍 escala</label>
            <input type="range" id="scaleSlider" min="0.3" max="3" step="0.05" value="1.0">
            <div class="value-display" id="scaleValue">1.00x</div>
            <div class="hint">+ / - en teclado</div>
        </div>
        <div class="transform-group">
            <label>🔄 rotación</label>
            <input type="range" id="rotationSlider" min="0" max="360" step="1" value="0">
            <div class="value-display" id="rotationValue">0°</div>
            <div class="hint">R / Shift+R</div>
        </div>
    </div>

    <!-- Overlay y panel -->
    <div class="panel-overlay" id="panelOverlay"></div>
    <div class="edit-panel" id="editPanel">
        <div class="panel-header">
            <h2>🛠️ editar elementos</h2>
            <button class="close-btn" id="closePanelBtn">✕</button>
        </div>
        <div class="controls-grid">
            <!-- SECCIÓN LIENZO -->
            <div class="control-section">
                <div class="section-title">📐 lienzo & fondo</div>
                <div class="controls-row">
                    <div class="control-group">
                        <label>tamaño canvas</label>
                        <select id="canvasSizeSelect">
                            <option value="1024x1024">1024 x 1024</option>
                            <option value="1080x1920" selected>1080 x 1920</option>
                            <option value="1920x1080">1920 x 1080</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>modo fondo</label>
                        <div style="display:flex; gap:8px;">
                            <button id="bgModeColor" class="align-btn active" style="flex:1;">color</button>
                            <button id="bgModeImage" class="align-btn" style="flex:1;">imagen</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>color sólido</label>
                        <input type="color" id="bgColorPicker" value="#2b2638">
                    </div>
                    <div class="control-group">
                        <label>imagen fondo</label>
                        <label class="custom-image-upload" style="display:block;">
                            📂 seleccionar imagen
                            <input type="file" id="bgImageUpload" accept="image/*">
                        </label>
                        <div class="image-fit-info">ajuste cover sin distorsión</div>
                    </div>
                </div>
            </div>
            
            <!-- SECCIÓN TEXTO -->
            <div class="control-section">
                <div class="section-title">✍️ texto</div>
                <div class="controls-row">
                    <div class="control-group" style="flex:2;">
                        <label>párrafo (Enter = salto)</label>
                        <textarea id="textInput" rows="3">EFECTOS\nCOOL</textarea>
                    </div>
                    <div class="control-group" style="flex:2;">
                        <label>tipo letra</label>
                        <select id="fontSelect" size="5" style="height: auto; min-height: 180px;">
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="Arial Black, sans-serif">Arial Black</option>
                            <option value="Baskerville, serif">Baskerville</option>
                            <option value="Calibri, sans-serif">Calibri</option>
                            <option value="Cambria, serif">Cambria</option>
                            <option value="Candara, sans-serif">Candara</option>
                            <option value="Comic Sans MS, cursive">Comic Sans</option>
                            <option value="Consolas, monospace">Consolas</option>
                            <option value="Courier New, monospace">Courier New</option>
                            <option value="Franklin Gothic Medium, sans-serif">Franklin Gothic</option>
                            <option value="Garamond, serif">Garamond</option>
                            <option value="Georgia, serif">Georgia</option>
                            <option value="Helvetica, sans-serif">Helvetica</option>
                            <option value="Impact, sans-serif">Impact</option>
                            <option value="Lucida Console, monospace">Lucida Console</option>
                            <option value="Lucida Sans, sans-serif">Lucida Sans</option>
                            <option value="Microsoft Sans Serif, sans-serif">Microsoft Sans</option>
                            <option value="Palatino, serif">Palatino</option>
                            <option value="Segoe UI, sans-serif" selected>Segoe UI</option>
                            <option value="Tahoma, sans-serif">Tahoma</option>
                            <option value="Times New Roman, serif">Times New Roman</option>
                            <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
                            <option value="Verdana, sans-serif">Verdana</option>
                            <option value="'Poppins', sans-serif">Poppins</option>
                            <option value="'Roboto', sans-serif">Roboto</option>
                            <option value="'Open Sans', sans-serif">Open Sans</option>
                            <option value="'Lato', sans-serif">Lato</option>
                            <option value="'Montserrat', sans-serif">Montserrat</option>
                            <option value="'Oswald', sans-serif">Oswald</option>
                            <option value="'Raleway', sans-serif">Raleway</option>
                            <option value="'Ubuntu', sans-serif">Ubuntu</option>
                        </select>
                        <div class="font-info">+30 fuentes del sistema</div>
                    </div>
                    <div class="control-group">
                        <label>fuente personalizada</label>
                        <label class="custom-font-upload">
                            📂 subir .ttf/.otf
                            <input type="file" id="customFontUpload" accept=".ttf,.otf,font/ttf,font/otf">
                        </label>
                        <div class="font-info" id="customFontName">ninguna</div>
                    </div>
                </div>
                <div class="controls-row" style="margin-top:15px;">
                    <div class="control-group">
                        <label>alineación</label>
                        <div class="alignment-buttons">
                            <button id="alignLeft" class="align-btn active" title="Izquierda">⬅️</button>
                            <button id="alignCenter" class="align-btn" title="Centro">⬇️</button>
                            <button id="alignRight" class="align-btn" title="Derecha">➡️</button>
                            <button id="alignJustify" class="align-btn" title="Justificado">☰</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>interlineado</label>
                        <div class="line-height-control">
                            <input type="range" id="lineHeightRange" min="0.8" max="2.5" value="1.2" step="0.1">
                            <span id="lineHeightVal">1.2</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN EFECTOS (para texto) -->
            <div class="control-section">
                <div class="section-title">🎨 efectos de texto</div>
                <div class="controls-row">
                    <div class="control-group">
                        <label>relleno</label>
                        <input type="color" id="fillColorPicker" value="#ff78c6">
                    </div>
                    <div class="control-group">
                        <label>color stroke</label>
                        <input type="color" id="strokeColorPicker" value="#000000">
                    </div>
                    <div class="control-group">
                        <label>ancho stroke</label>
                        <input type="range" id="strokeWidthRange" min="0" max="20" value="3" step="0.5">
                        <span id="strokeWidthVal">3.0</span>
                        <div class="stroke-info">redondeado (sin picos)</div>
                    </div>
                    <div class="control-group">
                        <label>sombra</label>
                        <input type="range" id="shadowBlurRange" min="0" max="25" value="5" step="0.5">
                        <span id="shadowBlurVal">5</span>
                    </div>
                    <div class="control-group">
                        <label>3D extrude</label>
                        <input type="range" id="extrudeRange" min="0" max="40" value="12" step="1">
                        <span id="extrudeVal">12</span>
                    </div>
                </div>
            </div>

            <!-- BOTONES ACCIÓN -->
            <div class="action-buttons-panel">
                <div class="export-options">
                    <div class="transparent-checkbox">
                        <input type="checkbox" id="transparentBg" checked>
                        <label for="transparentBg">fondo transparente</label>
                    </div>
                    <button id="savePngBtn" class="primary-btn">💾 guardar PNG</button>
                </div>
                <div class="active-text-indicator">🔖 <span id="selectedId">ninguno</span></div>
            </div>
            <div style="text-align:center; color:#8899cc; padding:10px;">⌨️ + / - escala | R / shift+R rotación</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- INICIALIZACIÓN -----
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        let canvasWidth = 1080;
        let canvasHeight = 1920;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // fondo
        let bgMode = 'color';
        let bgColor = '#2b2638';
        let bgImage = null;

        // Elementos (textos e imágenes)
        let elements = [];
        let nextId = 1;
        let selectedIndex = -1;

        // drag
        let isDragging = false;
        let dragIndex = -1;
        let dragOffsetX = 0, dragOffsetY = 0;
        let isTyping = false;

        // Fuentes personalizadas
        let customFonts = {};

        // ----- REFERENCIAS DOM -----
        const floatingMenuBtn = document.getElementById('floatingMenuBtn');
        const editPanel = document.getElementById('editPanel');
        const panelOverlay = document.getElementById('panelOverlay');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const floatingAddTextBtn = document.getElementById('floatingAddTextBtn');
        const floatingAddImageBtn = document.getElementById('floatingAddImageBtn');
        const floatingDeleteBtn = document.getElementById('floatingDeleteBtn');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const rotationSlider = document.getElementById('rotationSlider');
        const rotationValue = document.getElementById('rotationValue');

        const canvasSizeSelect = document.getElementById('canvasSizeSelect');
        const bgColorPicker = document.getElementById('bgColorPicker');
        const textInput = document.getElementById('textInput');
        const fontSelect = document.getElementById('fontSelect');
        const lineHeightRange = document.getElementById('lineHeightRange');
        const lineHeightVal = document.getElementById('lineHeightVal');
        const fillColorPicker = document.getElementById('fillColorPicker');
        const strokeColorPicker = document.getElementById('strokeColorPicker');
        const strokeWidthRange = document.getElementById('strokeWidthRange');
        const strokeWidthVal = document.getElementById('strokeWidthVal');
        const shadowBlurRange = document.getElementById('shadowBlurRange');
        const shadowBlurVal = document.getElementById('shadowBlurVal');
        const extrudeRange = document.getElementById('extrudeRange');
        const extrudeVal = document.getElementById('extrudeVal');
        const selectedIdSpan = document.getElementById('selectedId');
        const bgModeColorBtn = document.getElementById('bgModeColor');
        const bgModeImageBtn = document.getElementById('bgModeImage');
        const bgImageUpload = document.getElementById('bgImageUpload');
        const transparentCheck = document.getElementById('transparentBg');
        const savePngBtn = document.getElementById('savePngBtn');
        const alignLeftBtn = document.getElementById('alignLeft');
        const alignCenterBtn = document.getElementById('alignCenter');
        const alignRightBtn = document.getElementById('alignRight');
        const alignJustifyBtn = document.getElementById('alignJustify');
        const customFontUpload = document.getElementById('customFontUpload');
        const customFontName = document.getElementById('customFontName');

        // ----- FUNCIONES DE DIBUJO -----
        function darkenColor(hex, factor) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            r = Math.min(255, Math.max(0, Math.floor(r * factor)));
            g = Math.min(255, Math.max(0, Math.floor(g * factor)));
            b = Math.min(255, Math.max(0, Math.floor(b * factor)));
            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
        }

        function drawImageCover(ctx, img, w, h) {
            const imgAspect = img.width / img.height;
            const canvasAspect = w / h;
            let drawW, drawH, offsetX = 0, offsetY = 0;
            if (imgAspect > canvasAspect) {
                drawH = h;
                drawW = img.width * (h / img.height);
                offsetX = (w - drawW) / 2;
            } else {
                drawW = w;
                drawH = img.height * (w / img.width);
                offsetY = (h - drawH) / 2;
            }
            ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        }

        // Dibujar texto
        function drawWordWithEffects(ctx, t, word, x, y) {
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            if (t.extrude > 0) {
                const steps = t.extrude;
                const originalShadow = ctx.shadowBlur;
                ctx.shadowBlur = 0;
                for (let i = steps; i >= 0; i--) {
                    let offX = i * 0.9, offY = i * 0.45;
                    let darkFactor = 1 - (i / (steps+2)) * 0.4;
                    ctx.fillStyle = darkenColor(t.fillColor, darkFactor);
                    if (t.strokeWidth > 0) {
                        ctx.strokeStyle = t.strokeColor;
                        ctx.lineWidth = t.strokeWidth;
                        ctx.strokeText(word, x + offX, y + offY);
                    }
                    ctx.fillText(word, x + offX, y + offY);
                }
                ctx.shadowBlur = originalShadow;
                if (t.shadowBlur > 0) {
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = t.shadowBlur * 1.5;
                    ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
                }
            } else {
                if (t.strokeWidth > 0) {
                    ctx.strokeStyle = t.strokeColor;
                    ctx.lineWidth = t.strokeWidth;
                    ctx.strokeText(word, x, y);
                }
                ctx.fillStyle = t.fillColor;
                ctx.fillText(word, x, y);
            }
        }

        function drawLineWithExtrude(ctx, t, line, x, y) {
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            const steps = t.extrude;
            const originalShadow = ctx.shadowBlur;
            ctx.shadowBlur = 0;
            for (let i = steps; i >= 0; i--) {
                let offX = i * 0.9, offY = i * 0.45;
                let darkFactor = 1 - (i / (steps+2)) * 0.4;
                ctx.fillStyle = darkenColor(t.fillColor, darkFactor);
                if (t.strokeWidth > 0) {
                    ctx.strokeStyle = t.strokeColor;
                    ctx.lineWidth = t.strokeWidth;
                    ctx.strokeText(line, x + offX, y + offY);
                }
                ctx.fillText(line, x + offX, y + offY);
            }
            ctx.shadowBlur = originalShadow;
            if (t.shadowBlur > 0) {
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = t.shadowBlur * 1.5;
                ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
            }
        }

        function drawMultilineText(ctx, t) {
            const lines = t.text.split('\n');
            const fontSize = t.fontSize || 60;
            const lineHeight = (t.lineHeight || 1.2) * fontSize;
            const alignment = t.alignment || 'left';
            
            ctx.font = `bold ${fontSize}px ${t.fontFamily}`;
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            
            const lineWidths = lines.map(l => ctx.measureText(l).width);
            const maxWidth = Math.max(...lineWidths);
            const totalHeight = lines.length * lineHeight;
            const startY = -totalHeight / 2 + lineHeight/2;

            lines.forEach((line, index) => {
                const y = startY + index * lineHeight;
                
                if (alignment === 'justify' && index < lines.length - 1 && line.split(' ').length > 1) {
                    const words = line.split(' ');
                    const wordCount = words.length;
                    const totalSpaces = wordCount - 1;
                    const totalWidth = ctx.measureText(line).width;
                    const spaceWidth = (maxWidth - totalWidth) / totalSpaces;
                    let currentX = -maxWidth / 2;
                    
                    for (let w = 0; w < wordCount; w++) {
                        const word = words[w];
                        const wordWidth = ctx.measureText(word).width;
                        drawWordWithEffects(ctx, t, word, currentX, y);
                        currentX += wordWidth + spaceWidth;
                    }
                    return;
                }
                
                let x = 0;
                if (alignment === 'left' || (alignment === 'justify' && index === lines.length - 1)) {
                    ctx.textAlign = 'left';
                    x = -maxWidth / 2;
                } else if (alignment === 'center') {
                    ctx.textAlign = 'center';
                    x = 0;
                } else if (alignment === 'right') {
                    ctx.textAlign = 'right';
                    x = maxWidth / 2;
                }
                
                if (t.extrude > 0) {
                    drawLineWithExtrude(ctx, t, line, x, y);
                } else {
                    if (t.strokeWidth > 0) {
                        ctx.strokeStyle = t.strokeColor;
                        ctx.lineWidth = t.strokeWidth;
                        ctx.strokeText(line, x, y);
                    }
                    ctx.fillStyle = t.fillColor;
                    ctx.fillText(line, x, y);
                }
            });
        }

        // Dibujar imagen
        function drawImage(ctx, imgEl) {
            if (!imgEl.image) return;
            
            // Calcular dimensiones manteniendo aspecto
            const maxSize = 200; // tamaño base
            let drawWidth, drawHeight;
            
            if (imgEl.image.width > imgEl.image.height) {
                drawWidth = maxSize;
                drawHeight = (imgEl.image.height / imgEl.image.width) * maxSize;
            } else {
                drawHeight = maxSize;
                drawWidth = (imgEl.image.width / imgEl.image.height) * maxSize;
            }
            
            // Aplicar sombra si existe
            if (imgEl.shadowBlur > 0) {
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = imgEl.shadowBlur * 1.5;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 5;
            }
            
            ctx.drawImage(imgEl.image, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
            
            // Resetear sombra
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }

        function drawBackground() {
            if (bgMode === 'color') {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            } else if (bgMode === 'image' && bgImage) {
                drawImageCover(ctx, bgImage, canvasWidth, canvasHeight);
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }
        }

        function drawSelectionBox() {
            if (selectedIndex < 0 || selectedIndex >= elements.length) return;
            const el = elements[selectedIndex];
            ctx.save();
            ctx.translate(el.x, el.y);
            ctx.rotate(el.rotation * Math.PI/180);
            ctx.scale(el.scale, el.scale);
            
            let width = 100, height = 60; // valores por defecto
            
            if (el.type === 'text') {
                const fontSize = el.fontSize || 60;
                ctx.font = `bold ${fontSize}px ${el.fontFamily}`;
                const lines = el.text.split('\n');
                const lineHeight = (el.lineHeight || 1.2) * fontSize;
                width = Math.max(...lines.map(l => ctx.measureText(l).width));
                height = lines.length * lineHeight;
            } else if (el.type === 'image' && el.image) {
                const maxSize = 200;
                if (el.image.width > el.image.height) {
                    width = maxSize;
                    height = (el.image.height / el.image.width) * maxSize;
                } else {
                    height = maxSize;
                    width = (el.image.width / el.image.height) * maxSize;
                }
            }
            
            ctx.strokeStyle = '#f2cb4e';
            ctx.lineWidth = 4 / el.scale;
            ctx.shadowColor = 'transparent';
            ctx.setLineDash([8 / el.scale, 6 / el.scale]);
            ctx.strokeRect(-width/2 - 20, -height/2 - 20, width + 40, height + 40);
            ctx.setLineDash([]);
            ctx.restore();
        }

        function drawCanvas() {
            drawBackground();
            elements.forEach(el => {
                ctx.save();
                ctx.translate(el.x, el.y);
                ctx.rotate(el.rotation * Math.PI/180);
                ctx.scale(el.scale, el.scale);
                
                if (el.shadowBlur > 0 && el.extrude === 0) {
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = el.shadowBlur * 1.5;
                    ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
                }
                
                if (el.type === 'text') {
                    drawMultilineText(ctx, el);
                } else if (el.type === 'image') {
                    drawImage(ctx, el);
                }
                
                ctx.restore();
            });
            drawSelectionBox();
        }

        // ----- CARGA DE FUENTES PERSONALIZADAS -----
        customFontUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const fontData = event.target.result;
                const fontName = 'CustomFont_' + Date.now();
                
                const style = document.createElement('style');
                style.textContent = `
                    @font-face {
                        font-family: '${fontName}';
                        src: url('${fontData}') format('truetype');
                        font-weight: bold;
                    }
                `;
                document.head.appendChild(style);
                
                customFonts[file.name] = fontName;
                
                const option = document.createElement('option');
                option.value = `'${fontName}', sans-serif`;
                option.textContent = `✨ ${file.name} (personalizada)`;
                option.selected = true;
                fontSelect.appendChild(option);
                
                customFontName.textContent = `fuente: ${file.name}`;
                
                if (selectedIndex >= 0 && elements[selectedIndex]?.type === 'text') {
                    elements[selectedIndex].fontFamily = option.value;
                    syncUiToSelected();
                    drawCanvas();
                }
            };
            reader.readAsDataURL(file);
        });

        // ----- ALINEACIÓN -----
        function setActiveAlignment(align) {
            [alignLeftBtn, alignCenterBtn, alignRightBtn, alignJustifyBtn].forEach(btn => btn.classList.remove('active'));
            if (align === 'left') alignLeftBtn.classList.add('active');
            else if (align === 'center') alignCenterBtn.classList.add('active');
            else if (align === 'right') alignRightBtn.classList.add('active');
            else if (align === 'justify') alignJustifyBtn.classList.add('active');
        }
        function getCurrentAlignment() {
            if (alignLeftBtn.classList.contains('active')) return 'left';
            if (alignCenterBtn.classList.contains('active')) return 'center';
            if (alignRightBtn.classList.contains('active')) return 'right';
            if (alignJustifyBtn.classList.contains('active')) return 'justify';
            return 'left';
        }

        // ----- SINCRONIZACIÓN UI -----
        function syncUiToSelected() {
            if (selectedIndex >= 0 && elements[selectedIndex]) {
                const el = elements[selectedIndex];
                
                if (el.type === 'text') {
                    textInput.value = el.text;
                    fontSelect.value = el.fontFamily;
                    lineHeightRange.value = el.lineHeight || 1.2;
                    lineHeightVal.textContent = (el.lineHeight || 1.2).toFixed(1);
                    setActiveAlignment(el.alignment || 'left');
                    fillColorPicker.value = el.fillColor;
                    strokeColorPicker.value = el.strokeColor;
                    strokeWidthRange.value = el.strokeWidth;
                    strokeWidthVal.textContent = el.strokeWidth.toFixed(1);
                    shadowBlurRange.value = el.shadowBlur;
                    shadowBlurVal.textContent = el.shadowBlur;
                    extrudeRange.value = el.extrude;
                    extrudeVal.textContent = el.extrude;
                }
                
                scaleSlider.value = el.scale;
                scaleValue.textContent = el.scale.toFixed(2) + 'x';
                rotationSlider.value = el.rotation;
                rotationValue.textContent = el.rotation + '°';
            }
        }

        function applyCurrentSettingsToSelected() {
            if (selectedIndex >= 0 && elements[selectedIndex]?.type === 'text') {
                const el = elements[selectedIndex];
                el.text = textInput.value;
                el.fontFamily = fontSelect.value;
                el.lineHeight = parseFloat(lineHeightRange.value);
                el.alignment = getCurrentAlignment();
                el.fillColor = fillColorPicker.value;
                el.strokeColor = strokeColorPicker.value;
                el.strokeWidth = parseFloat(strokeWidthRange.value);
                el.shadowBlur = parseFloat(shadowBlurRange.value);
                el.extrude = parseFloat(extrudeRange.value);
                drawCanvas();
            }
        }

        function updateSelectedBadge() {
            if (selectedIndex >= 0 && elements[selectedIndex]) {
                const el = elements[selectedIndex];
                selectedIdSpan.textContent = `#${el.id} (${el.type})`;
            } else {
                selectedIdSpan.textContent = 'ninguno';
            }
        }

        // ----- EVENTOS DE CONTROLES -----
        textInput.addEventListener('input', applyCurrentSettingsToSelected);
        fontSelect.addEventListener('change', applyCurrentSettingsToSelected);
        lineHeightRange.addEventListener('input', applyCurrentSettingsToSelected);
        fillColorPicker.addEventListener('input', applyCurrentSettingsToSelected);
        strokeColorPicker.addEventListener('input', applyCurrentSettingsToSelected);
        strokeWidthRange.addEventListener('input', applyCurrentSettingsToSelected);
        shadowBlurRange.addEventListener('input', applyCurrentSettingsToSelected);
        extrudeRange.addEventListener('input', applyCurrentSettingsToSelected);
        
        alignLeftBtn.addEventListener('click', () => { setActiveAlignment('left'); applyCurrentSettingsToSelected(); });
        alignCenterBtn.addEventListener('click', () => { setActiveAlignment('center'); applyCurrentSettingsToSelected(); });
        alignRightBtn.addEventListener('click', () => { setActiveAlignment('right'); applyCurrentSettingsToSelected(); });
        alignJustifyBtn.addEventListener('click', () => { setActiveAlignment('justify'); applyCurrentSettingsToSelected(); });

        // ----- CONTROLADORES FLOTANTES -----
        scaleSlider.addEventListener('input', () => {
            if (selectedIndex >= 0 && elements[selectedIndex]) {
                elements[selectedIndex].scale = parseFloat(scaleSlider.value);
                scaleValue.textContent = scaleSlider.value + 'x';
                drawCanvas();
            }
        });
        rotationSlider.addEventListener('input', () => {
            if (selectedIndex >= 0 && elements[selectedIndex]) {
                elements[selectedIndex].rotation = parseFloat(rotationSlider.value);
                rotationValue.textContent = rotationSlider.value + '°';
                drawCanvas();
            }
        });

        // ----- AÑADIR TEXTO -----
        function addNewText() {
            const newText = {
                id: nextId++,
                type: 'text',
                text: textInput.value || 'TEXTO',
                fontFamily: fontSelect.value,
                lineHeight: parseFloat(lineHeightRange.value),
                alignment: getCurrentAlignment(),
                fillColor: fillColorPicker.value,
                strokeColor: strokeColorPicker.value,
                strokeWidth: parseFloat(strokeWidthRange.value),
                shadowBlur: parseFloat(shadowBlurRange.value),
                extrude: parseFloat(extrudeRange.value),
                x: Math.random() * (canvasWidth-400) + 200,
                y: Math.random() * (canvasHeight-400) + 200,
                scale: 1.0,
                rotation: 0,
                fontSize: 60,
            };
            elements.push(newText);
            selectedIndex = elements.length - 1;
            updateSelectedBadge();
            syncUiToSelected();
            drawCanvas();
        }

        // ----- AÑADIR IMAGEN -----
        function addNewImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/png,image/svg+xml,image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const newImage = {
                            id: nextId++,
                            type: 'image',
                            image: img,
                            shadowBlur: 0,
                            x: Math.random() * (canvasWidth-400) + 200,
                            y: Math.random() * (canvasHeight-400) + 200,
                            scale: 1.0,
                            rotation: 0,
                        };
                        elements.push(newImage);
                        selectedIndex = elements.length - 1;
                        updateSelectedBadge();
                        syncUiToSelected();
                        drawCanvas();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        floatingAddTextBtn.addEventListener('click', addNewText);
        floatingAddImageBtn.addEventListener('click', addNewImage);

        // ----- BORRAR -----
        function deleteSelected() {
            if (selectedIndex >= 0 && elements[selectedIndex]) {
                elements.splice(selectedIndex, 1);
                selectedIndex = elements.length > 0 ? 0 : -1;
                updateSelectedBadge();
                if (selectedIndex >= 0) syncUiToSelected();
                drawCanvas();
            }
        }
        floatingDeleteBtn.addEventListener('click', deleteSelected);

        // ----- CANVAS SIZE -----
        canvasSizeSelect.addEventListener('change', (e) => {
            const [w, h] = e.target.value.split('x').map(Number);
            canvasWidth = w; canvasHeight = h;
            canvas.width = w; canvas.height = h;
            drawCanvas();
        });

        // ----- FONDO -----
        bgColorPicker.addEventListener('input', (e) => { bgColor = e.target.value; if (bgMode === 'color') drawCanvas(); });
        bgModeColorBtn.addEventListener('click', () => {
            bgMode = 'color';
            bgModeColorBtn.classList.add('active');
            bgModeImageBtn.classList.remove('active');
            drawCanvas();
        });
        bgModeImageBtn.addEventListener('click', () => {
            bgMode = 'image';
            bgModeColorBtn.classList.remove('active');
            bgModeImageBtn.classList.add('active');
            drawCanvas();
        });
        bgImageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => { bgImage = img; if (bgMode === 'image') drawCanvas(); };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // ----- DRAG -----
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            for (let i = elements.length - 1; i >= 0; i--) {
                const el = elements[i];
                const dx = mx - el.x;
                const dy = my - el.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) {
                    selectedIndex = i;
                    updateSelectedBadge();
                    syncUiToSelected();
                    isDragging = true;
                    dragIndex = i;
                    dragOffsetX = mx - el.x;
                    dragOffsetY = my - el.y;
                    drawCanvas();
                    e.preventDefault();
                    return;
                }
            }
            selectedIndex = -1;
            updateSelectedBadge();
            drawCanvas();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || dragIndex === -1) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            elements[dragIndex].x = mx - dragOffsetX;
            elements[dragIndex].y = my - dragOffsetY;
            drawCanvas();
        });

        window.addEventListener('mouseup', () => { isDragging = false; dragIndex = -1; });

        // ----- TECLADO -----
        window.addEventListener('keydown', (e) => {
            if (isTyping) return;
            if (selectedIndex < 0 || !elements[selectedIndex]) return;
            const el = elements[selectedIndex];
            if (e.key === '+' || e.key === '=') {
                el.scale = Math.min(3, el.scale + 0.05);
                scaleSlider.value = el.scale;
                scaleValue.textContent = el.scale.toFixed(2) + 'x';
                drawCanvas(); e.preventDefault();
            } else if (e.key === '-' || e.key === '_') {
                el.scale = Math.max(0.3, el.scale - 0.05);
                scaleSlider.value = el.scale;
                scaleValue.textContent = el.scale.toFixed(2) + 'x';
                drawCanvas(); e.preventDefault();
            } else if (e.key.toLowerCase() === 'r') {
                el.rotation = (el.rotation + (e.shiftKey ? -5 : 5)) % 360;
                rotationSlider.value = el.rotation;
                rotationValue.textContent = el.rotation + '°';
                drawCanvas(); e.preventDefault();
            }
        });

        // ----- EXPORTAR PNG -----
        savePngBtn.addEventListener('click', () => {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvasWidth;
            exportCanvas.height = canvasHeight;
            const eCtx = exportCanvas.getContext('2d');
            eCtx.lineJoin = 'round'; eCtx.lineCap = 'round';

            if (!transparentCheck.checked) {
                if (bgMode === 'color') {
                    eCtx.fillStyle = bgColor;
                    eCtx.fillRect(0, 0, canvasWidth, canvasHeight);
                } else if (bgMode === 'image' && bgImage) {
                    drawImageCover(eCtx, bgImage, canvasWidth, canvasHeight);
                } else {
                    eCtx.fillStyle = bgColor;
                    eCtx.fillRect(0, 0, canvasWidth, canvasHeight);
                }
            }

            elements.forEach(el => {
                eCtx.save();
                eCtx.translate(el.x, el.y);
                eCtx.rotate(el.rotation * Math.PI/180);
                eCtx.scale(el.scale, el.scale);
                
                if (el.shadowBlur > 0 && el.extrude === 0) {
                    eCtx.shadowColor = 'rgba(0,0,0,0.7)';
                    eCtx.shadowBlur = el.shadowBlur * 1.5;
                    eCtx.shadowOffsetX = 5; eCtx.shadowOffsetY = 5;
                }
                
                if (el.type === 'text') {
                    // Versión simplificada para exportación
                    const lines = el.text.split('\n');
                    const fontSize = el.fontSize || 60;
                    const lineHeight = (el.lineHeight || 1.2) * fontSize;
                    const alignment = el.alignment || 'left';
                    eCtx.font = `bold ${fontSize}px ${el.fontFamily}`;
                    eCtx.textBaseline = 'middle';
                    
                    const maxWidth = Math.max(...lines.map(l => eCtx.measureText(l).width));
                    const startY = - (lines.length * lineHeight) / 2 + lineHeight/2;
                    
                    lines.forEach((line, idx) => {
                        const y = startY + idx * lineHeight;
                        let x = 0;
                        if (alignment === 'left') { eCtx.textAlign = 'left'; x = -maxWidth/2; }
                        else if (alignment === 'center') { eCtx.textAlign = 'center'; x = 0; }
                        else if (alignment === 'right') { eCtx.textAlign = 'right'; x = maxWidth/2; }
                        
                        if (el.strokeWidth > 0) {
                            eCtx.strokeStyle = el.strokeColor;
                            eCtx.lineWidth = el.strokeWidth;
                            eCtx.strokeText(line, x, y);
                        }
                        eCtx.fillStyle = el.fillColor;
                        eCtx.fillText(line, x, y);
                    });
                } else if (el.type === 'image' && el.image) {
                    const maxSize = 200;
                    let drawWidth, drawHeight;
                    if (el.image.width > el.image.height) {
                        drawWidth = maxSize;
                        drawHeight = (el.image.height / el.image.width) * maxSize;
                    } else {
                        drawHeight = maxSize;
                        drawWidth = (el.image.width / el.image.height) * maxSize;
                    }
                    eCtx.drawImage(el.image, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                }
                
                eCtx.restore();
            });

            const link = document.createElement('a');
            link.download = `textfx_${canvasWidth}x${canvasHeight}${transparentCheck.checked ? '_transparente' : ''}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        });

        // ----- GESTIÓN FOCO -----
        const inputElements = [textInput, fontSelect, bgColorPicker, fillColorPicker, strokeColorPicker, strokeWidthRange, shadowBlurRange, extrudeRange, lineHeightRange];
        inputElements.forEach(el => {
            el.addEventListener('focus', () => isTyping = true);
            el.addEventListener('blur', () => isTyping = false);
            if (el.tagName === 'SELECT') el.addEventListener('mousedown', () => isTyping = true);
        });
        bgImageUpload.addEventListener('focus', () => isTyping = true);
        bgImageUpload.addEventListener('blur', () => isTyping = false);
        customFontUpload.addEventListener('focus', () => isTyping = true);
        customFontUpload.addEventListener('blur', () => isTyping = false);

        // ----- PANEL -----
        function openPanel() { editPanel.classList.add('show'); panelOverlay.classList.add('show'); floatingMenuBtn.classList.add('active'); }
        function closePanel() { editPanel.classList.remove('show'); panelOverlay.classList.remove('show'); floatingMenuBtn.classList.remove('active'); }
        floatingMenuBtn.addEventListener('click', openPanel);
        closePanelBtn.addEventListener('click', closePanel);
        panelOverlay.addEventListener('click', closePanel);

        // ----- ELEMENTOS DE EJEMPLO -----
        function addExampleElements() {
            elements.push({
                id: nextId++, type: 'text',
                text: 'TEXTO\n3D\nISO', fontFamily: 'Impact, sans-serif', lineHeight: 1.2, alignment: 'center',
                fillColor: '#ffb347', strokeColor: '#7a3b0e', strokeWidth: 8, shadowBlur: 8, extrude: 22,
                x: 300, y: 600, scale: 1.2, rotation: 0, fontSize: 70
            });
            elements.push({
                id: nextId++, type: 'text',
                text: 'PÁRRAFO JUSTIFICADO\nCON VARIAS PALABRAS\nPARA VER EL EFECTO', fontFamily: 'Arial Black, sans-serif',
                lineHeight: 1.3, alignment: 'justify', fillColor: '#7cc9ff', strokeColor: '#003f66', strokeWidth: 6,
                shadowBlur: 18, extrude: 0, x: 760, y: 900, scale: 1.0, rotation: 5, fontSize: 50
            });
            selectedIndex = 0;
            updateSelectedBadge();
            syncUiToSelected();
            drawCanvas();
        }
        addExampleElements();
    })();
</script>
